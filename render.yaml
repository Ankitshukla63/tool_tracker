services:
  - type: web
    name: rfid-tool-tracker
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install -g pnpm@9 && bash build.sh
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: rfid-db
          property: connectionString

databases:
  - name: rfid-db
    plan: free
    region: singapore
