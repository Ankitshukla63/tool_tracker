services:
  - type: web
    name: rfid-tool-tracker
    runtime: node
    region: singapore
    plan: free
    buildCommand: "corepack enable pnpm && pnpm install --frozen-lockfile && PORT=3000 BASE_PATH=/ NODE_ENV=production pnpm --filter @workspace/rfid-frontend run build && pnpm --filter @workspace/api-server run build"
    startCommand: "node --enable-source-maps artifacts/api-server/dist/index.mjs"
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: rfid-db
          property: connectionString

databases:
  - name: rfid-db
    plan: free
    region: singapore
